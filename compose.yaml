services:
  db:
    image: postgres:18-alpine
    restart: always
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 1s

  app:
    build: .
    env_file:
      - config.env
    ports:
      - "${HTTP_PORT}:${HTTP_PORT}"
    depends_on:
      db:
        condition: service_healthy

  load-test:
    image: grafana/k6:latest
    profiles:
      - rps test
    volumes:
      - ./rps_test.js:/rps_test.js:ro
    command: run /rps_test.js

volumes:
  pgdata:
