services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 1s
      timeout: 1s
      retries: 10
      start_period: 1s

  test:
    build:
      context: .
      dockerfile: DockerfileTest
    depends_on:
      db:
        condition: service_healthy
    working_dir: /app
    command: go test ./...
#    command: go test --race ./...
#    environment:
#      - CGO_ENABLED=1
    volumes:
      - .:/app
